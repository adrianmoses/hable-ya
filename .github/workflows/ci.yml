name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  checks:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    services:
      postgres:
        image: apache/age:release_PG18_1.7.0
        env:
          POSTGRES_USER: hable_ya
          POSTGRES_PASSWORD: hable_ya
          POSTGRES_DB: hable_ya
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U hable_ya"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python 3.12
        run: uv python install 3.12

      # Skip the `finetune` extra: torch/unsloth are multi-GB and are only
      # needed for model training, which runs in notebooks, not CI.
      - name: Install deps (eval + dev extras)
        run: uv sync --extra eval --extra dev

      - name: Download Spanish spaCy model
        run: uv run python -m spacy download es_core_news_sm

      - name: Wait for Postgres
        run: |
          for i in $(seq 1 30); do
            if pg_isready -h localhost -U hable_ya; then
              exit 0
            fi
            sleep 1
          done
          echo "Postgres did not become ready in 30s" >&2
          exit 1

      # Ruff/mypy are scoped to the directories whose lint/type debt has been
      # paid down (hable_ya, api, eval/agent from spec 034, and the spec-021
      # and spec-034 tests). The rest of the repo (eval/ outside agent/,
      # finetune/, scripts/fixtures/, older tests/) has pre-existing issues
      # that are out of scope for this job.
      - name: Ruff
        run: |
          uv run ruff check \
            hable_ya/ api/ eval/agent/ \
            tests/test_tool_handler.py \
            tests/test_runner.py \
            tests/test_health.py \
            tests/test_prompts.py \
            tests/test_db.py \
            tests/test_init_db.py \
            tests/conftest.py \
            tests/test_agent_personas.py \
            tests/test_agent_cache.py \
            tests/test_agent_accumulator.py \
            tests/test_agent_learner.py \
            tests/test_agent_judge_prompts.py \
            tests/test_agent_aggregates.py \
            tests/test_aggregations_shared.py \
            tests/test_learner_profile.py \
            scripts/voice_client.py

      - name: Mypy
        run: |
          uv run mypy \
            hable_ya/ api/ eval/agent/ \
            tests/test_tool_handler.py \
            tests/test_runner.py \
            tests/test_health.py \
            tests/test_prompts.py \
            tests/test_db.py \
            tests/test_init_db.py \
            tests/conftest.py \
            tests/test_agent_personas.py \
            tests/test_agent_cache.py \
            tests/test_agent_accumulator.py \
            tests/test_agent_learner.py \
            tests/test_agent_judge_prompts.py \
            tests/test_agent_aggregates.py \
            tests/test_aggregations_shared.py \
            tests/test_learner_profile.py

      - name: Pytest
        env:
          HABLE_YA_DATABASE_URL: postgresql://hable_ya:hable_ya@localhost:5432/hable_ya
        run: uv run pytest tests/ -v
