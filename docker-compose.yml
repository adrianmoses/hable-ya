services:
  app:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      # Override the .env default (localhost) so in-compose runs reach the db
      # service by its compose hostname. On-host runs (uv run uvicorn …) still
      # use the .env value.
      HABLE_YA_DATABASE_URL: postgresql://hable_ya:hable_ya@db:5432/hable_ya
    volumes:
      - ./data:/app/data
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    depends_on:
      llama:
        condition: service_started
      db:
        condition: service_healthy

  db:
    image: apache/age:release_PG18_1.7.0
    ports:
      # Host 5433 → container 5432 so we don't collide with a system-level
      # Postgres on the default port. In-compose runs reach the service via
      # its `db` hostname on 5432 (see app.environment override).
      - "5433:5432"
    environment:
      POSTGRES_USER: hable_ya
      POSTGRES_PASSWORD: hable_ya
      POSTGRES_DB: hable_ya
    volumes:
      # PG18 convention: mount at /var/lib/postgresql (base dir), not the
      # legacy /var/lib/postgresql/data. The image stores data under
      # <base>/<major>/docker/ so pg_upgrade can work in place.
      - pgdata:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hable_ya -d hable_ya"]
      interval: 5s
      timeout: 3s
      retries: 10

  llama:
    image: ghcr.io/ggml-org/llama.cpp:server-cuda
    ports:
      - "8080:8080"
    volumes:
      - ./models:/models
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    command: >
      --model /models/gemma-4-e4b-finetuned_gguf/gemma-4-e4b-hf.Q8_0.gguf
      --host 0.0.0.0
      --port 8080
      --n-gpu-layers 99
      --parallel 4
      --ctx-size 16384
      --cont-batching

volumes:
  pgdata:
