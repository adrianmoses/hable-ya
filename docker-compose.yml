services:
  app:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - ./data:/app/data
    depends_on:
      - llama

  llama:
    image: ghcr.io/ggml-org/llama.cpp:server-cuda
    ports:
      - "8080:8080"
    volumes:
      - ./models:/models
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    command: >
      --model /models/gemma-4-e4b-finetuned_gguf/gemma-4-e4b-hf.Q8_0.gguf
      --host 0.0.0.0
      --port 8080
      --n-gpu-layers 99
      --parallel 4
      --ctx-size 16384
      --cont-batching
