# Alembic config for hable-ya.
#
# `sqlalchemy.url` is intentionally blank — env.py sets it at runtime from
# `hable_ya.config.settings.database_url`, rewritten to the async driver form.
# This prevents a stale .ini from ever connecting to the wrong DSN.

[alembic]
script_location = %(here)s/hable_ya/db/alembic
prepend_sys_path = .
path_separator = os
timezone = UTC

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
